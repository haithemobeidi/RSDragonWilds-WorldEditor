<div class="tab-content" id="tab-skills">
    {% if characters %}
    {% set char = active_char %}
    <div class="card">
        <div class="card-title">Skills Editor</div>
        <div class="skill-row" style="background:transparent;border:none;font-weight:600;color:var(--text-dim);font-size:12px">
            <span>SKILL</span>
            <span style="text-align:center">LEVEL</span>
            <span>PROGRESS</span>
            <span style="text-align:right">XP</span>
            <span></span>
        </div>
        <div id="skillsList">
        {% for skill in char.skills %}
            <div class="skill-row" data-skill-id="{{ skill.id }}">
                <span class="skill-name">{{ skill.name }}</span>
                <span class="skill-level" data-field="level">{{ skill.level }}</span>
                <div class="xp-bar-container">
                    <div class="xp-bar" data-field="bar" style="width: {{ skill.xp_pct }}%"></div>
                    <span class="xp-bar-text" data-field="bar-text">{{ skill.xp }} / {{ skill.xp_next }}</span>
                </div>
                <input type="number" data-field="xp" value="{{ skill.xp }}" min="0" max="200000000"
                       onchange="queueSkillUpdate('{{ skill.id }}', this.value, this)">
                <button class="btn" style="padding:4px 8px;font-size:11px" onclick="maxSkill('{{ skill.id }}', this)">MAX</button>
            </div>
        {% endfor %}
        </div>
    </div>
    {% endif %}
</div>
